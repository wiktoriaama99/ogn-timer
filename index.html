<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ognista ziemia - timer</title>

    <link rel="icon" type="image/png" href="alliesicon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <h1>Ognista ziemia</h1>
    <p>Metki Mordu</p>
</header>

<div class="global-settings">

    <label>Domyślny czas (minuty)</label>

    <div class="global-input">

        <input
            type="number"
            id="defaultMinutes"
            value="30"
            min="1"
        >

        <button id="saveDefault">
            ZAPISZ
        </button>

        <button id="openMap">
            🗺️ MAPA
        </button>

    </div>

</div>

<main id="app"></main>

<template id="sectionTemplate">

    <section class="section">

        <h2 class="section-title"></h2>

        <div class="channels"></div>

    </section>

</template>

<template id="channelTemplate">

    <div class="channel-card">

        <div class="left">

            <div class="channel-name">
                CH1
            </div>

            <div class="timer">
                00:00
            </div>

        </div>

        <div class="right">

            <button class="start">
                ▶ START
            </button>

            <button class="reset">
                🔄 RESET
            </button>

        </div>

    </div>

</template>

<div id="mapModal" class="modal">

    <div class="modal-content">

        <button id="closeMap" class="close-map">
            ✖
        </button>

        <img src="mapa70.png" alt="Mapa" id="mapImage">

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
